<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <style>:root {
  --color: black;
  --bg: white;
  --head-bg: white;
  --link: #338;

  --blue: #ccf;
  --red: #fcc;
  --yellow: #ffc;
  --green: #cfc;
}

[data-theme='dark'] {
  --color: white;
  --bg: black;
  --head-bg: #333;
  --link: #aaf;

  --blue: #225;
  --red: #522;
  --yellow: #552;
  --green: #252;
}

html,
body {
  margin: 0;
  padding: 0;
  color: var(--color);
  background: var(--bg);
}

.app {
  margin: 10px;
  padding: 0;
}

.files-list {
  margin: 10px 0 0;
  width: 100%;
  border-collapse: collapse;
}
.files-list__head {
  border: 1px solid #999;
}
.files-list__head > tr > th {
  padding: 10px;
  border: 1px solid #999;
  text-align: left;
  font-weight: normal;
  background: var(--head-bg);
}
.files-list__body {
}
.files-list__file {
  cursor: pointer;
}
.files-list__file:hover {
  background: var(--blue);
}
.files-list__file > td {
  padding: 10px;
  border: 1px solid #999;
}
.files-list__file > td:first-child::before {
  content: '\01F4C4';
  margin-right: 1em;
}
.files-list__file_low {
  background: var(--red);
}
.files-list__file_medium {
  background: var(--yellow);
}
.files-list__file_high {
  background: var(--green);
}
.files-list__file_folder > td:first-child::before {
  content: '\01F4C1';
  margin-right: 1em;
}

.file-header {
  border: 1px solid #999;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  background: var(--bg);
}

.file-header__back {
  margin: 10px;
  cursor: pointer;
  flex-shrink: 0;
  flex-grow: 0;
  text-decoration: underline;
  color: var(--link);
}

.file-header__name {
  margin: 10px;
  flex-shrink: 2;
  flex-grow: 2;
}

.file-header__stat {
  margin: 10px;
  flex-shrink: 0;
  flex-grow: 0;
}

.file-content {
  margin: 10px 0 0;
  border: 1px solid #999;
  padding: 10px;
  counter-reset: line;
  display: flex;
  flex-direction: column;
}

.code-line::before {
  content: counter(line);
  margin-right: 72px;
}
.code-line {
  margin: 0;
  height: 1em;
  counter-increment: line;

  position: absolute;
  padding: 0 0.3em 0.3em 0.3em;
  display: inherit;
  width: 100%;
}
.code-line_covered {
  background: var(--green);
}
.code-line_uncovered {
  background: var(--red);
}

.code-text-container {
  position: relative;
  height: 1em;
  padding: 0.3em 0;
}

.cover-indicator {
  display: flex;
  width: 100%;
  position: absolute;
  justify-content: end;
  height: 1em;
  align-items: center;
  padding: 0 0.3em 0.3em 0.3em;
}

.cover-indicator.check-cover::after {
  content: "\2713";
  font-weight: bold;
  background-color: var(--green);
  height: 1em;
}

.cover-indicator.no-cover::after {
  content: "\2716";
  font-weight: bold;
  background-color: var(--red);
  height: 1em;
}

.stat-line-hit {
  max-width: 48px;
  overflow: hidden;
  font-weight: bold;
  margin-right: 4px;
  background-color: var(--green);
  position: relative;
  top: 0.1em;
}

#theme-toggle-label {
  margin-left: 1ch;
}
</style>
</head>

 {\n    let device_id = \u0026config.device.device_id;\n    let heartbeat_interval = tokio::time::Duration::from_secs(config.polling.heartbeat_interval_seconds);\n    let poll_interval = tokio::time::Duration::from_secs(config.polling.interval_seconds);\n\n    info!(\"Starting main loop - poll interval: {}s, heartbeat: {}s\",\n          config.polling.interval_seconds,\n          config.polling.heartbeat_interval_seconds);\n\n    let mut heartbeat_timer = tokio::time::interval(heartbeat_interval);\n    let mut poll_timer = tokio::time::interval(poll_interval);\n\n    loop {\n        tokio::select! {\n            _ = heartbeat_timer.tick() =\u003e {\n                if let Err(e) = send_heartbeat(api_client, device_id).await {\n                    warn!(\"Failed to send heartbeat: {}\", e);\n                }\n            }\n\n            _ = poll_timer.tick() =\u003e {\n                if let Err(e) = poll_and_execute_task(api_client, config).await {\n                    error!(\"Task execution failed: {}\", e);\n                }\n            }\n        }\n    }\n}\n\nasync fn send_heartbeat(api_client: \u0026ApiClient, device_id: \u0026str) -\u003e Result\u003c()\u003e {\n    let heartbeat = Heartbeat {\n        device_id: device_id.to_string(),\n        runner_version: \"0.1.0\".to_string(),\n        status: RunnerStatus::Idle,\n        current_task_id: None,\n        current_task_progress: 0.0,\n        system_resources: models::SystemResources {\n            cpu_percent: get_cpu_usage(),\n            memory_used_mb: get_memory_used_mb(),\n            memory_total_mb: get_memory_total_mb(),\n            disk_used_gb: get_disk_used_gb(),\n            disk_total_gb: get_disk_total_gb(),\n        },\n        capabilities: models::Capabilities {\n            supported_step_types: vec![\n                models::StepType::Python,\n                models::StepType::Binary,\n                models::StepType::Shell,\n                models::StepType::Api,\n            ],\n            has_oob_capture: false,\n            has_gpu: false,\n            gpu_model: None,\n            oob_methods: vec![],\n        },\n        last_report: Utc::now().to_rfc3339(),\n    };\n\n    api_client.send_heartbeat(\u0026heartbeat).await\n}\n\nasync fn poll_and_execute_task(api_client: \u0026ApiClient, config: \u0026RunnerConfig) -\u003e Result\u003c()\u003e {\n    match api_client.poll_for_task().await? {\n        None =\u003e {\n            tracing::debug!(\"No pending tasks\");\n        }\n        Some(mut manifest) =\u003e {\n            info!(\"Found task: {} (priority: {:?})\", manifest.task_id, manifest.priority);\n\n            api_client.assign_task(\u0026manifest.task_id).await?;\n\n            let start_time = Utc::now();\n            let pipeline_engine = PipelineEngine::new();\n            let step_results = pipeline_engine.execute(\u0026manifest).await?;\n            let end_time = Utc::now();\n\n            let successful_steps = step_results.iter()\n                .filter(|r| matches!(r.status, models::TaskStatus::Success))\n                .count() as u32;\n\n            let failed_steps = step_results.iter()\n                .filter(|r| matches!(r.status, models::TaskStatus::Failed | models::TaskStatus::Crashed | models::TaskStatus::Timeout))\n                .count() as u32;\n\n            let skipped_steps = step_results.iter()\n                .filter(|r| matches!(r.status, models::TaskStatus::Skipped))\n                .count() as u32;\n\n            let overall_status = if failed_steps == 0 {\n                models::TaskStatus::Success\n            } else {\n                models::TaskStatus::Failed\n            };\n\n            let result = ExecutionResult {\n                schema_version: \"1.0.0\".to_string(),\n                task_id: manifest.task_id.clone(),\n                status: overall_status.clone(),\n                started_at: start_time.to_rfc3339(),\n                completed_at: Some(end_time.to_rfc3339()),\n                duration_seconds: (end_time - start_time).num_seconds() as f64,\n                device_info: DeviceInfo {\n                    device_id: config.device.device_id.clone(),\n                    hostname: config.device.hostname.clone(),\n                    ip_address: None,\n                    os_version: None,\n                    runner_version: \"0.1.0\".to_string(),\n                },\n                steps: step_results.clone(),\n                summary: Summary {\n                    total_steps: manifest.pipeline.len() as u32,\n                    successful_steps,\n                    failed_steps,\n                    skipped_steps,\n                    crashed_steps: 0,\n                    total_duration_seconds: (end_time - start_time).num_seconds() as f64,\n                    total_artifacts: 0,\n                    total_log_lines: 0,\n                },\n                ai_rca: None,\n                forensics: models::Forensics::default(),\n            };\n\n            api_client.report_result(\u0026result).await?;\n            info!(\"Task {} completed with status: {:?}\", manifest.task_id, overall_status);\n        }\n    }\n\n    Ok(())\n}\n\n#[cfg(target_os = \"linux\")]\nfn get_cpu_usage() -\u003e f64 {\n    use std::fs;\n    if let Ok(proc_stat) = fs::read_to_string(\"/proc/stat\") {\n        let lines: Vec\u003c\u0026str\u003e = proc_stat.lines().collect();\n        if let Some(line) = lines.first() {\n            let parts: Vec\u003cu64\u003e = line.split_whitespace()\n                .skip(1)\n                .filter_map(|s| s.parse().ok())\n                .collect();\n\n            if parts.len() \u003e= 4 {\n                let idle = parts[3];\n                let total: u64 = parts.iter().sum();\n                if total \u003e 0 {\n                    return ((total - idle) as f64 / total as f64) * 100.0;\n                }\n            }\n        }\n    }\n    0.0\n}\n\n#[cfg(target_os = \"linux\")]\nfn get_memory_used_mb() -\u003e u64 {\n    use std::fs;\n\n    let available_kb = if let Ok(proc_meminfo) = fs::read_to_string(\"/proc/meminfo\") {\n        for line in proc_meminfo.lines() {\n            if line.starts_with(\"MemAvailable:\") {\n                if let Some(avail_str) = line.split(':').nth(1) {\n                    if let Some(val_str) = avail_str.trim().split_whitespace().next() {\n                        if let Ok(mem_kb) = val_str.parse::\u003cu64\u003e() {\n                            return mem_kb;\n                        }\n                    }\n                }\n            }\n        }\n        0\n    } else {\n        0\n    };\n\n    let total_kb = if let Ok(proc_meminfo) = fs::read_to_string(\"/proc/meminfo\") {\n        for line in proc_meminfo.lines() {\n            if line.starts_with(\"MemTotal:\") {\n                if let Some(total_str) = line.split(':').nth(1) {\n                    if let Some(val_str) = total_str.trim().split_whitespace().next() {\n                        if let Ok(mem_kb) = val_str.parse::\u003cu64\u003e() {\n                            return mem_kb;\n                        }\n                    }\n                }\n            }\n        }\n        8192 * 1024\n    } else {\n        8192 * 1024\n    };\n\n    if total_kb \u003e available_kb {\n        (total_kb - available_kb) / 1024\n    } else {\n        0\n    }\n}\n\n#[cfg(not(target_os = \"linux\"))]\nfn get_cpu_usage() -\u003e f64 { 0.0 }\n\n#[cfg(not(target_os = \"linux\"))]\nfn get_memory_used_mb() -\u003e u64 { 0 }\n\nfn get_memory_total_mb() -\u003e u64 {\n    8192\n}\n\nfn get_disk_used_gb() -\u003e u64 {\n    50\n}\n\nfn get_disk_total_gb() -\u003e u64 {\n    500\n}","traces":[{"line":21,"address":[11880464,11880927,11880921],"length":1,"stats":{"Line":0}},{"line":22,"address":[11665725],"length":1,"stats":{"Line":0}},{"line":24,"address":[11665849,11666183],"length":1,"stats":{"Line":0}},{"line":26,"address":[11666149,11666431,11671200,11671216],"lengt     <script>const e = React.createElement;

function pathToString(path) {
  if (path[0] === '/') {
    return '/' + path.slice(1).join('/');
  } else {
    return path.join('/');
  }
}

function findCommonPath(files) {
  if (!files || !files.length) {
    return [];
  }

  function isPrefix(arr, prefix) {
    if (arr.length < prefix.length) {
      return false;
    }
    for (let i = prefix.length - 1; i >= 0; --i) {
      if (arr[i] !== prefix[i]) {
        return false;
      }
    }
    return true;
  }

  let commonPath = files[0].path.slice(0, -1);
  while (commonPath.length) {
    if (files.every(file => isPrefix(file.path, commonPath))) {
      break;
    }
    commonPath.pop();
  }
  return commonPath;
}

function findFolders(files) {
  if (!files || !files.length) {
    return [];
  }

  let folders = files.filter(file => file.path.length > 1).map(file => file.path[0]);
  folders = [...new Set(folders)]; // unique
  folders.sort();

  folders = folders.map(folder => {
    let filesInFolder = files
      .filter(file => file.path[0] === folder)
      .map(file => ({
        ...file,
        path: file.path.slice(1),
        parent: [...file.parent, file.path[0]],
      }));

    const children = findFolders(filesInFolder); // recursion

    return {
      is_folder: true,
      path: [folder],
      parent: files[0].parent,
      children,
      covered: children.reduce((sum, file) => sum + file.covered, 0),
      coverable: children.reduce((sum, file) => sum + file.coverable, 0),
      prevRun: {
        covered: children.reduce((sum, file) => sum + file.prevRun.covered, 0),
        coverable: children.reduce((sum, file) => sum + file.prevRun.coverable, 0),
      },
    };
  });

  return [...folders, ...files.filter(file => file.path.length === 1)];
}

class App extends React.Component {
  constructor(...args) {
    super(...args);

    this.state = {
      current: [],
    };
  }

  componentDidMount() {
    this.updateStateFromLocation();
    window.addEventListener('hashchange', () => this.updateStateFromLocation(), false);
  }

  updateStateFromLocation() {
    if (window.location.hash.length > 1) {
      const current = window.location.hash.slice(1).split('/');
      this.setState({current});
    } else {
      this.setState({current: []});
    }
  }

  getCurrentPath() {
    let file = this.props.root;
    let path = [file];
    for (let p of this.state.current) {
      file = file.children.find(file => file.path[0] === p);
      if (!file) {
        return path;
      }
      path.push(file);
    }
    return path;
  }

  render() {
    const path = this.getCurrentPath();
    const file = path[path.length - 1];

    let w = null;
    if (file.is_folder) {
      w = e(FilesList, {
        folder: file,
        onSelectFile: this.selectFile.bind(this),
        onBack: path.length > 1 ? this.back.bind(this) : null,
      });
    } else {
      w = e(DisplayFile, {
        file,
        onBack: this.back.bind(this),
      });
    }

    return e('div', {className: 'app'}, w);
  }

  selectFile(file) {
    this.setState(
      ({current}) => {
        return {current: [...current, file.path[0]]};
      },
      () => this.updateHash(),
    );
  }

  back(file) {
    this.setState(
      ({current}) => {
        return {current: current.slice(0, current.length - 1)};
      },
      () => this.updateHash(),
    );
  }

  updateHash() {
    if (!this.state.current || !this.state.current.length) {
      window.location = '#';
    } else {
      window.location = '#' + this.state.current.join('/');
    }
  }
}

function FilesList({folder, onSelectFile, onBack}) {
  let files = folder.children;
  return e(
    'div',
    {className: 'display-folder'},
    e(FileHeader, {file: folder, onBack}),
    e(
      'table',
      {className: 'files-list'},
      e('thead', {className: 'files-list__head'}, e('tr', null, e('th', null, 'Path'), e('th', null, 'Coverage'))),
      e(
        'tbody',
        {className: 'files-list__body'},
        files.map(file => e(File, {file, onClick: onSelectFile})),
      ),
    ),
  );
}

function File({file, onClick}) {
  const coverage = file.coverable ? (file.covered / file.coverable) * 100 : -1;
  const coverageDelta =
    file.prevRun && (file.covered / file.coverable) * 100 - (file.prevRun.covered / file.prevRun.coverable) * 100;

  return e(
    'tr',
    {
      className:
        'files-list__file' +
        (coverage >= 0 && coverage < 50 ? ' files-list__file_low' : '') +
        (coverage >= 50 && coverage < 80 ? ' files-list__file_medium' : '') +
        (coverage >= 80 ? ' files-list__file_high' : '') +
        (file.is_folder ? ' files-list__file_folder' : ''),
      onClick: () => onClick(file),
    },
    e('td', null, e('a', null, pathToString(file.path))),
    e(
      'td',
      null,
      file.covered + ' / ' + file.coverable + (coverage >= 0 ? ' (' + coverage.toFixed(2) + '%)' : ''),
      e(
        'span',
        {title: 'Change from the previous run'},
        coverageDelta ? ` (${coverageDelta > 0 ? '+' : ''}${coverageDelta.toFixed(2)}%)` : '',
      ),
    ),
  );
}

function DisplayFile({file, onBack}) {
  return e('div', {className: 'display-file'}, e(FileHeader, {file, onBack}), e(FileContent, {file}));
}

function FileHeader({file, onBack}) {
  const coverage = (file.covered / file.coverable) * 100;
  const coverageDelta = file.prevRun && coverage - (file.prevRun.covered / file.prevRun.coverable) * 100;

  return e(
    'div',
    {className: 'file-header'},
    onBack ? e('a', {className: 'file-header__back', onClick: onBack}, 'Back') : null,
    e('div', {className: 'file-header__name'}, pathToString([...file.parent, ...file.path])),
    e(
      'div',
      {className: 'file-header__stat'},
      'Covered: ' + file.covered + ' of ' + file.coverable + (file.coverable ? ' (' + coverage.toFixed(2) + '%)' : ''),
      e(
        'span',
        {title: 'Change from the previous run'},
        coverageDelta ? ` (${coverageDelta > 0 ? '+' : ''}${coverageDelta.toFixed(2)}%)` : '',
      ),
      e('input', {id: 'theme-toggle', type: 'checkbox', hidden: true}),
      e('label', {for: 'theme-toggle', id: 'theme-toggle-label'}, '🌙'),
    ),
  );
}

function FileContent({file}) {
  return e(
    'pre',
    {className: 'file-content'},
    file.content.split(/\r?\n/).map((line, index) => {
      const trace = file.traces.find(trace => trace.line === index + 1);
      const covered = trace && trace.stats.Line;
      const uncovered = trace && !trace.stats.Line;
      const nbHit = covered? trace.stats.Line: 0;
      return e(
        'div',
        { className: 'code-text-container' },
        e(
          'code',
          {
            className: 'code-line' + (covered ? ' code-line_covered' : '') + (uncovered ? ' code-line_uncovered' : ''),
          },
          line
        ),
        e(
          'div',
          { className: 'cover-indicator' + (covered? ' check-cover': '') + (uncovered? ' no-cover': '')},
          e(
            'div',
            { className: (covered? 'stat-line-hit': '')},
            covered? nbHit: ""
          )
        )
      );
    }),
  );
}

(function () {
  const commonPath = findCommonPath(data.files);
  const prevFilesMap = new Map();

  previousData &&
    previousData.files.forEach(file => {
      const path = file.path.slice(commonPath.length).join('/');
      prevFilesMap.set(path, file);
    });

  const files = data.files.map(file => {
    const path = file.path.slice(commonPath.length);
    const {covered = 0, coverable = 0} = prevFilesMap.get(path.join('/')) || {};
    return {
      ...file,
      path,
      parent: commonPath,
      prevRun: {covered, coverable},
    };
  });

  const children = findFolders(files);

  const root = {
    is_folder: true,
    children,
    path: commonPath,
    parent: [],
    covered: children.reduce((sum, file) => sum + file.covered, 0),
    coverable: children.reduce((sum, file) => sum + file.coverable, 0),
    prevRun: {
      covered: children.reduce((sum, file) => sum + file.prevRun.covered, 0),
      coverable: children.reduce((sum, file) => sum + file.prevRun.coverable, 0),
    },
  };

  ReactDOM.render(e(App, {root, prevFilesMap}), document.getElementById('root'));

  const toggle = document.getElementById('theme-toggle');
  const label = document.getElementById('theme-toggle-label');
  label.textContent = '🌙';

  toggle.addEventListener('change', () => {
    if (toggle.checked) {
      document.documentElement.setAttribute('data-theme', 'dark');
      label.textContent = '☀️';
    } else {
      document.documentElement.removeAttribute('data-theme');
      label.textContent = '🌙';
    }
  });
})();
</script>
